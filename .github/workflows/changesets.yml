name: Changesets

on:
  push:
    branches: [master]

concurrency:
  group: changesets-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  version-pr:
    name: Open or update Version Packages PR
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Create or update Version Packages PR
        id: changesets
        uses: changesets/action@v1
        with:
          version: true
          publish: false
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ github.token }}
        continue-on-error: true

  tag:
    name: Tag version bump commit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: "github.event.head_commit.message == 'chore: version packages'"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Compute package version
        id: ver
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Skip if tag already exists
        id: exists
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.ver.outputs.version }}" | grep -q .; then
            echo "already-exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag v${{ steps.ver.outputs.version }} already exists on remote; skipping."
          else
            echo "already-exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push git tag
        if: steps.exists.outputs.already-exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git tag "v${{ steps.ver.outputs.version }}"
          git push origin "v${{ steps.ver.outputs.version }}"