name: Version bump

on:
  push:
    branches: [master]

concurrency:
  group: version-bump-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  bump:
    name: Apply changesets, sync version.ts, tag
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Apply changesets
        run: npx changeset version

      - name: Sync src/lib/version.ts
        run: node scripts/sync-version.mjs

      - name: Stage changes
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No pending changesets; nothing to bump."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
        id: stage

      - name: Commit and push bump
        if: steps.stage.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: version packages"
          git push origin master

      - name: Push tag if missing
        if: steps.stage.outputs.changed == 'true'
        run: |
          version="$(node -p "require('./package.json').version")"
          if git ls-remote --tags origin "refs/tags/v${version}" | grep -q .; then
            echo "Tag v${version} already exists on remote; skipping."
          else
            git tag "v${version}"
            git push origin "v${version}"
          fi